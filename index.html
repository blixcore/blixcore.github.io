<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLIX | OFFICIAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --accent: #ff3e3e; 
            --secondary: #1a1a1a;
            
            /* Authentic Brand Colors */
            --brand-spotify: #1DB954;
            --brand-apple: #fc3c44;
            --brand-bandcamp: #629aa9;
            --brand-youtube: #FF0000;
            --brand-instagram: #E4405F;
            --brand-x: #ffffff;
            --brand-facebook: #1877F2;
            --brand-tiktok: #25F4EE;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
        }

        nav {
            display: flex;
            justify-content: center;
            padding: 3rem 1.5rem 1rem;
        }

        .logo { 
            font-family: 'Oswald', sans-serif; 
            font-size: 3rem; 
            letter-spacing: 10px; 
            font-weight: 700; 
        }

        header {
            padding: 2rem 0 5rem;
            text-align: center;
        }

        .tagline {
            letter-spacing: 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            opacity: 0.6;
        }

        .main-content { 
            max-width: 700px; 
            margin: 0 auto 8rem; 
            padding: 0 5%; 
            text-align: center;
        }
        
        h2 { 
            font-family: 'Oswald', sans-serif; 
            font-size: 1.8rem; 
            text-transform: uppercase; 
            margin-bottom: 2rem; 
        }

        .tour-placeholder {
            border: 1px solid var(--secondary);
            padding: 2rem;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 2px;
            color: #444;
        }

        /* DEPARTMENTALIZED FOOTER */
        footer {
            background: #000;
            padding: 6rem 5% 4rem;
            border-top: 1px solid var(--secondary);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .dept-title {
            font-family: 'Oswald', sans-serif;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 1rem;
            margin-bottom: 2rem;
            display: block;
            opacity: 0.9;
        }

        .icon-list {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .social-link {
            text-decoration: none;
            font-size: 2rem;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .social-link:hover { 
            transform: translateY(-3px);
            opacity: 0.8;
        }

        /* BRAND COLORS */
        .fa-spotify { color: var(--brand-spotify); }
        .fa-apple { color: var(--brand-apple); }
        .fa-bandcamp { color: var(--brand-bandcamp); }
        .fa-youtube { color: var(--brand-youtube); }
        .fa-instagram { color: var(--brand-instagram); }
        .fa-x-twitter { color: var(--brand-x); } 
        .fa-facebook { color: var(--brand-facebook); }
        .fa-tiktok { color: var(--brand-tiktok); }

        .copyright { 
            text-align: center; 
            opacity: 0.2; 
            font-size: 0.7rem; 
            margin-top: 8rem; 
            letter-spacing: 2px; 
        }

        @media (max-width: 600px) {
            .footer-grid { grid-template-columns: 1fr; gap: 4rem; text-align: center; }
            .icon-list { justify-content: center; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">BLIX</div>
    </nav>

    <header>
        <p class="tagline">Official Site</p>
    </header>

    <main class="main-content">
        <h2>Tour</h2>
        <div class="tour-placeholder">
            DATES COMING SOON
        </div>
    </main>

    <footer>
        <div class="footer-grid">
            <div class="dept">
                <span class="dept-title">Music</span>
                <div class="icon-list">
                    <a href="#" class="social-link"><i class="fa-brands fa-spotify"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-apple"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-bandcamp"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-youtube"></i></a>
                </div>
            </div>

            <div class="dept">
                <span class="dept-title">Social</span>
                <div class="icon-list">
                    <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-tiktok"></i></a>
                    <a href="#" class="social-link"><i class="fa-brands fa-facebook"></i></a>
                </div>
            </div>
        </div>

        <div class="copyright">
            &copy; 2026 BLIX. ALL RIGHTS RESERVED.
        </div>
    </footer>

</body>
</html>
